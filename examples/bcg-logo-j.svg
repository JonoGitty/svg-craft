<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img">
  <title>Blank Canvas Games</title>
  <!-- Concept J: Overlapping circles/shapes - abstract art meets Venn diagram of "games" -->
  <defs>
    <linearGradient id="grad-j1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6ff7"/>
      <stop offset="100%" stop-color="#5b52d4"/>
    </linearGradient>
  </defs>

  <!-- Background: dark rounded square -->
  <rect x="8" y="8" width="184" height="184" rx="32" fill="#1a1a1e"/>

  <!-- Large circle - "canvas" / creativity -->
  <circle cx="82" cy="88" r="52" fill="none" stroke="#7c6ff7" stroke-width="4" opacity="0.8"/>

  <!-- Medium circle - "games" / play -->
  <circle cx="126" cy="106" r="44" fill="none" stroke="#22d3ee" stroke-width="4" opacity="0.8"/>

  <!-- Overlap zone - where art meets games - filled -->
  <clipPath id="clip-left">
    <circle cx="82" cy="88" r="52"/>
  </clipPath>
  <circle cx="126" cy="106" r="44" fill="#7c6ff7" opacity="0.2" clip-path="url(#clip-left)"/>

  <!-- Play triangle in the intersection -->
  <path d="M100 84 L100 112 L120 98 Z" fill="#e8e8ec"/>

  <!-- Paintbrush crossing diagonally -->
  <line x1="30" y1="170" x2="60" y2="140" stroke="#c49a6c" stroke-width="5" stroke-linecap="round"/>
  <line x1="60" y1="140" x2="64" y2="136" stroke="#aaa" stroke-width="5.5" stroke-linecap="round"/>
  <ellipse cx="67" cy="133" rx="4" ry="6" fill="#e94560" transform="rotate(-45 67 133)"/>

  <!-- Small accent elements -->
  <circle cx="148" cy="54" r="3" fill="#22d3ee" opacity="0.5"/>
  <circle cx="44" cy="152" r="2.5" fill="#7c6ff7" opacity="0.5"/>

  <!-- Subtle text hint -->
  <text x="100" y="174" text-anchor="middle" font-family="system-ui" font-weight="700" font-size="11" fill="#9e9ea8" letter-spacing="4">BLANK CANVAS</text>
</svg>
