<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img">
  <title>World Map - Accurate Continental Outlines</title>
  <desc>Equirectangular projection world map with detailed continent and island outlines</desc>
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6ff7"/>
      <stop offset="100%" stop-color="#5b52d4"/>
    </linearGradient>
    <style>
      .land { fill: var(--map-land, #7c6ff7); stroke: var(--map-stroke, #0c1a2e); stroke-width: 0.5; stroke-linejoin: round; }
      .water { fill: var(--map-ocean, #0c1a2e); }
      .graticule { stroke: #1a2a44; stroke-width: 0.3; fill: none; }
    </style>
  </defs>

  <!-- Ocean background -->
  <rect class="water" width="1000" height="500"/>

