<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img">
  <title>Blank Canvas Games</title>
  <!-- Concept H: Blank canvas being splashed with colour - the moment of creation -->
  <defs>
    <linearGradient id="splash-h1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6ff7"/>
      <stop offset="100%" stop-color="#9d8fff"/>
    </linearGradient>
    <linearGradient id="splash-h2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- The blank canvas - white rounded rect -->
  <rect x="32" y="24" width="136" height="152" rx="8" fill="#fafafa" stroke="#d4d4d8" stroke-width="2"/>

  <!-- Colour splashes hitting the canvas -->
  <!-- Purple splash from left -->
  <path d="
    M16 70 C24 64, 36 58, 56 62
    C72 66, 80 80, 76 96
    C72 112, 58 118, 50 108
    C42 98, 46 82, 56 76
    C50 72, 36 68, 24 74
    Z
  " fill="url(#splash-h1)" opacity="0.85"/>
  <circle cx="22" cy="58" r="5" fill="#7c6ff7" opacity="0.5"/>
  <circle cx="14" cy="80" r="3" fill="#9d8fff" opacity="0.4"/>
  <circle cx="40" cy="54" r="3.5" fill="#7c6ff7" opacity="0.4"/>

  <!-- Cyan splash from right -->
  <path d="
    M184 110 C176 104, 164 100, 148 104
    C132 108, 122 122, 128 138
    C134 152, 148 156, 154 146
    C160 136, 156 120, 146 116
    C152 112, 168 110, 178 116
    Z
  " fill="url(#splash-h2)" opacity="0.85"/>
  <circle cx="186" cy="122" r="4" fill="#22d3ee" opacity="0.5"/>
  <circle cx="178" cy="98" r="3" fill="#38bdf8" opacity="0.4"/>
  <circle cx="162" cy="156" r="3.5" fill="#22d3ee" opacity="0.4"/>

  <!-- Small accent splash top right -->
  <path d="M142 28 C148 24, 158 30, 154 40 C150 48, 140 46, 138 38 C136 32, 138 28, 142 28 Z"
        fill="#e94560" opacity="0.6"/>
  <circle cx="158" cy="26" r="2.5" fill="#e94560" opacity="0.4"/>

  <!-- Green dot bottom left -->
  <circle cx="48" cy="158" r="8" fill="#16a34a" opacity="0.5"/>
  <circle cx="38" cy="164" r="3" fill="#16a34a" opacity="0.3"/>

  <!-- Play button emerging from the splashes -->
  <path d="M88 76 L88 124 L124 100 Z" fill="#1a1a1e" opacity="0.8"/>
</svg>
