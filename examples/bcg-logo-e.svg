<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img">
  <title>Blank Canvas Games</title>
  <!-- Concept E: Easel silhouette with gradient canvas - minimal and clean -->
  <defs>
    <linearGradient id="canvas-e" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6ff7"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Easel legs -->
  <path d="M68 130 L48 190 M132 130 L152 190 M100 52 L120 190"
        stroke="#e8e8ec" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- Cross brace -->
  <line x1="56" y1="168" x2="144" y2="168" stroke="#e8e8ec" stroke-width="4" stroke-linecap="round"/>

  <!-- Canvas - the star of the show -->
  <rect x="58" y="40" width="84" height="70" rx="3" fill="url(#canvas-e)"/>

  <!-- Canvas shelf -->
  <rect x="54" y="108" width="92" height="6" rx="2" fill="#e8e8ec"/>

  <!-- Top clamp -->
  <rect x="94" y="30" width="12" height="14" rx="3" fill="#e8e8ec"/>

  <!-- Play button on canvas (what's being painted) -->
  <path d="M88 60 L88 92 L116 76 Z" fill="#fff" opacity="0.9"/>

  <!-- Small paint dots around -->
  <circle cx="40" cy="120" r="4" fill="#7c6ff7" opacity="0.4"/>
  <circle cx="162" cy="100" r="3" fill="#22d3ee" opacity="0.4"/>
  <circle cx="50" cy="56" r="2.5" fill="#38bdf8" opacity="0.3"/>
</svg>
