<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img">
  <title>Blank Canvas Games</title>
  <!-- Concept C: Paintbrush drawing a game board grid -->
  <defs>
    <linearGradient id="stroke-c" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c6ff7"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Game board grid (painted/brushstroke style) -->
  <g stroke="url(#stroke-c)" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.8">
    <!-- Vertical lines -->
    <path d="M72 44 C73 46, 71 156, 72 160"/>
    <path d="M100 40 C101 42, 99 158, 100 162"/>
    <path d="M128 44 C129 46, 127 156, 128 160"/>
    <!-- Horizontal lines -->
    <path d="M44 72 C46 73, 156 71, 160 72"/>
    <path d="M40 100 C42 101, 158 99, 162 100"/>
    <path d="M44 128 C46 129, 156 127, 160 128"/>
  </g>

  <!-- Game pieces on the board -->
  <circle cx="86" cy="86" r="10" fill="#7c6ff7"/>
  <circle cx="114" cy="114" r="10" fill="#22d3ee"/>
  <circle cx="86" cy="142" r="10" fill="#e8e8ec" opacity="0.4"/>
  <!-- X mark -->
  <g stroke="#e94560" stroke-width="4" stroke-linecap="round">
    <line x1="108" y1="50" x2="122" y2="64"/>
    <line x1="122" y1="50" x2="108" y2="64"/>
  </g>

  <!-- Paintbrush in corner, "drawing" the grid -->
  <g transform="translate(162, 36) rotate(35)">
    <!-- Brush handle -->
    <rect x="-4" y="0" width="8" height="40" rx="3" fill="#c49a6c"/>
    <!-- Ferrule -->
    <rect x="-5" y="38" width="10" height="8" rx="1" fill="#aaa"/>
    <!-- Bristles -->
    <path d="M-5 46 L-3 58 C-2 62, 2 62, 3 58 L5 46 Z" fill="url(#stroke-c)"/>
  </g>
</svg>
