<!-- template: og-image -->
<!-- tags: template, social, og, preview, share, 1200x630 -->
<!-- notes: Open Graph preview image. 1200x630 is the standard. -->
<!--         Must look good when scaled down to ~600x315 in feeds. -->
<!--         Convert to PNG before use: sharp -i og.svg -o og.png --resize 1200 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img">
  <title>Social preview</title>
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1a2e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <!-- Logo area (left) -->
  <g transform="translate(120, 165)">
    <!-- Drop your logo SVG content here -->
    <rect width="300" height="300" rx="20" fill="#242429" stroke="#334155" stroke-width="2"/>
  </g>
  <!-- Text area (right) -->
  <text x="520" y="280" font-family="system-ui" font-weight="900" font-size="64" fill="#e8e8ec">Your Title Here</text>
  <text x="520" y="340" font-family="system-ui" font-weight="400" font-size="28" fill="#9e9ea8">Subtitle or tagline goes here</text>
  <!-- URL footer -->
  <text x="520" y="430" font-family="system-ui" font-weight="600" font-size="22" fill="#7c6ff7">yoursite.com</text>
</svg>
