<!-- snippet: animation-fade-in-up -->
<!-- tags: animation, fade, entrance, slide, up -->
<!-- usage: add class="fade-in-up" to any SVG element -->
<svg xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up { animation: fadeInUp 0.4s ease-out forwards; opacity: 0; }
    /* Stagger children: .fade-in-up:nth-child(2) { animation-delay: 0.1s; } etc */
  </style>
</svg>
